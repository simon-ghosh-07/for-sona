<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sona 🍦💖</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
    background-size: 300% 300%;
    animation: gradientBG 8s ease infinite;
    color: white;
    text-align: center;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    background: rgba(0,0,0,0.45);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 600px;
    backdrop-filter: blur(15px);
    z-index: 2;
}

#text {
    font-size: 18px;
    line-height: 1.7;
    min-height: 120px;
    margin-top: 15px;
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    background: #ff4e50;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1c1c;
    transform: scale(1.05);
}

/* Hidden image initially */
#herPhoto {
    display: none;
    margin-top: 20px;
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid white;
    box-shadow: 0 0 25px rgba(255,255,255,0.7);
    animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

/* Flying Ice Cream */
.icecream {
    position: absolute;
    font-size: 30px;
    animation: float 10s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh) rotate(0deg);}
    100% {transform: translateY(-10vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
    <h2>🍦💖</h2>

    <div id="text"></div>

    <img id="herPhoto" src="sona.jpg" alt="Her Photo">

    <button onclick="startEverything()">Tap Here ✨</button>
</div>

<audio id="bgMusic" src="icecream.mp3" loop></audio>

<script>
const message = "Sona… tell me, when are we finally going to have ice cream together? When I’m with you, I’ll take care of everything. You won’t have to worry about anything at all. Just trust me — your smile and your comfort mean everything to me.";

let index = 0;

function typeWriter() {
    if (index < message.length) {
        document.getElementById("text").innerHTML += message.charAt(index);
        index++;
        setTimeout(typeWriter, 35);
    }
}

function createIceCream() {
    const ice = document.createElement("div");
    ice.classList.add("icecream");
    ice.innerHTML = "🍦";
    ice.style.left = Math.random() * 100 + "vw";
    ice.style.animationDuration = (5 + Math.random() * 5) + "s";
    document.body.appendChild(ice);

    setTimeout(() => {
        ice.remove();
    }, 10000);
}

function startEverything() {
    document.getElementById("bgMusic").play();
    typeWriter();
    document.getElementById("herPhoto").style.display = "block";
    setInterval(createIceCream, 800);
}
</script>

</body>
</html>
